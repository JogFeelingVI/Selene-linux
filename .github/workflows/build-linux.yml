name: Build Selene Linux

on:
  workflow_dispatch: # 仅手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取源码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Linux 编译依赖
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev

      # 3. 运行项目中的 Python 脚本，直接执行热补丁注入（超清爽、超易调试）
      - name: Apply Custom HUD Patch
        run: python3 scripts/apply_hud_patch.py

      # 4. 配置 Flutter 环境
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 5. 获取 Flutter 依赖包
      - name: Install Flutter packages
        run: flutter pub get

      # 6. 编译 Linux 原生版本
      - name: Build Linux app
        run: flutter build linux --release

      # 7. 上传编译产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: selene-linux-x64
          path: build/linux/x64/release/bundle/
